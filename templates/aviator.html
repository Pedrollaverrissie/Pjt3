<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supernova Aviator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/aviator.css') }}">
</head>
    <script src="{{ url_for('static', filename='js/aviator.js') }}"></script>
<body>

<div class="container">

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            🚀 SUPERNOVA AVIATOR
        </div>

        <div class="user-info">

            <div class="balance">
                <small>Balance</small>
                <h3>KSh {{ balance or 0 }}</h3>
            </div>

            <div class="profile">
                {{ username[0]|upper }}
            </div>

        </div>

    </header>

    <!-- HISTORY -->

    <section class="history">

        <span class="green">8.44x</span>
        <span class="red">1.08x</span>
        <span class="green">15.22x</span>
        <span class="green">5.66x</span>
        <span class="red">1.02x</span>
        <span class="green">10.55x</span>

    </section>

    <!-- GAME -->

    <section class="game">

<div class="multiplier">

    <h1 id="multiplier">1.00x</h1>

    <p id="gameStatus">Waiting for next round...</p>

</div>



<div class="graph-area">

    <svg id="graph" viewBox="0 0 900 450">

        <path
            id="flightPath"
            d="M50 400 Q250 360 450 250 T850 60"
            fill="none"
            stroke="#00F5A0"
            stroke-width="6"/>

    </svg>

    <div id="plane">
        ✈️
    </div>

</div>

    </section>

    <!-- BOTTOM -->

    <section class="bottom">

        <!-- PLAYERS -->

        <div class="players">

            <h2>Live Players</h2>

            <div class="player-card">

                <div>
                    <strong>Peter</strong><br>
                    KSh 100
                </div>

                <span>Playing</span>

            </div>

            <div class="player-card">

                <div>
                    <strong>Brian</strong><br>
                    KSh 500
                </div>

                <span>Playing</span>

            </div>

            <div class="player-card">

                <div>
                    <strong>Alice</strong><br>
                    KSh 300
                </div>

                <span>Cashed Out</span>

            </div>

        </div>

        <!-- BET PANEL -->

        <div class="bet-panel">

            <h2>Place Bet</h2>

            <label>Bet Amount</label>

            <input
                type="number"
                placeholder="100">

            <label>Auto Cashout</label>

            <input
                type="number"
                placeholder="2.00">

            <button class="bet-btn">

                PLACE BET

            </button>

            <button class="cash-btn">

                CASH OUT

            </button>

        </div>

    </section>

</div>

</body>
</html>
