<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Aviator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='aviator.css') }}">
</head>
<body>

<div class="topbar">

    <div class="logo">
        🚀 Lucky Aviator
    </div>

    <div class="wallet">

        Balance

        <h2>KSh {{ balance }}</h2>

    </div>

</div>


<div class="history">

    <span class="red">1.12x</span>
    <span class="green">5.44x</span>
    <span class="green">18.90x</span>
    <span class="red">1.09x</span>
    <span class="green">7.55x</span>
    <span class="red">1.42x</span>
    <span class="green">12.80x</span>

</div>


<div class="game-container">

    <div class="game-screen">

        <div class="multiplier">

            <h1 id="multiplier">1.00x</h1>

            <p>Waiting for next round...</p>

        </div>

        <div class="rocket">

            🚀

        </div>

    </div>

</div>


<div class="bet-panel">

    <div class="bet-card">

        <h3>Bet Amount</h3>

        <input
            type="number"
            placeholder="100">

    </div>

    <div class="bet-card">

        <h3>Auto Cashout</h3>

        <input
            type="number"
            placeholder="2.00">

    </div>

</div>


<div class="buttons">

    <button class="bet-btn">

        PLACE BET

    </button>

    <button class="cash-btn">

        CASH OUT

    </button>

</div>


<div class="players">

    <h2>Players This Round</h2>

    <table>

        <tr>

            <th>Player</th>

            <th>Bet</th>

            <th>Status</th>

        </tr>

        <tr>

            <td>Peter</td>

            <td>200</td>

            <td>Playing</td>

        </tr>

        <tr>

            <td>James</td>

            <td>500</td>

            <td>Playing</td>

        </tr>

        <tr>

            <td>Alice</td>

            <td>100</td>

            <td>Cashed Out</td>

        </tr>

    </table>

</div>


<div class="bottom-menu">

    <div>
        🏠
        <p>Home</p>
    </div>

    <div>
        💰
        <p>Wallet</p>
    </div>

    <div>
        🏆
        <p>Leaderboard</p>
    </div>

    <div>
        👤
        <p>Profile</p>
    </div>

</div>

</body>
</html>
