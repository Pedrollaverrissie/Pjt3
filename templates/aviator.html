<div class="container">

    <header>

        <div class="logo">
            🚀 Lucky Aviator
        </div>

        <div class="balance">
            Balance
            <h2>KSh {{ balance }}</h2>
        </div>

    </header>

    <div class="history-bar">

        <span>1.04x</span>
        <span>2.66x</span>
        <span>15.88x</span>
        <span>1.21x</span>
        <span>6.42x</span>
        <span>3.11x</span>
        <span>1.09x</span>

    </div>

    <div class="game-screen">

        <canvas id="graph"></canvas>

        <div class="rocket">

            🚀

        </div>

        <h1 id="multiplier">

            1.00x

        </h1>

    </div>

    <div class="controls">

        <input
            type="number"
            placeholder="Bet Amount">

        <input
            type="number"
            placeholder="Auto Cashout">

        <button id="betBtn">

            PLACE BET

        </button>

        <button id="cashBtn">

            CASH OUT

        </button>

    </div>

    <div class="players">

        <h3>Players</h3>

        <table>

            <tr>

                <th>Player</th>

                <th>Bet</th>

            </tr>

            <tr>

                <td>Peter</td>

                <td>200</td>

            </tr>

            <tr>

                <td>James</td>

                <td>500</td>

            </tr>

            <tr>

                <td>Alice</td>

                <td>100</td>

            </tr>

        </table>

    </div>

</div>
