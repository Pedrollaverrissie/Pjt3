<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Supernova Aviator</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/aviator.css') }}">

</head>

<body>

<div class="container">

    <header>

        <div class="logo">

            🚀 SUPERNOVA AVIATOR

        </div>

        <div class="profile">

            Welcome {{ username }}

        </div>

    </header>

    <section class="history">

        <div class="pill red">1.08x</div>

        <div class="pill green">5.40x</div>

        <div class="pill green">12.60x</div>

        <div class="pill red">1.13x</div>

        <div class="pill green">7.85x</div>

    </section>

    <main>

        <div class="game-area">

            <h1>1.00x</h1>

            <p>Waiting for next round...</p>

        </div>

        <div class="bet-panel">

            <h2>Place Bet</h2>

            <input
            type="number"
            placeholder="Bet Amount">

            <input
            type="number"
            placeholder="Auto Cashout">

            <button>

                PLACE BET

            </button>

        </div>

    </main>

</div>

</body>

</html>
