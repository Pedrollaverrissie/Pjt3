<!DOCTYPE html>
<html>
<head>

    <title>Daily Tasks</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <style>
                        .tasks-container{
                    width:90%;
                    max-width:450px;
                    margin:40px auto;
                    background:#fff;
                    padding:25px;
                    border-radius:15px;
                    box-shadow:0 0 10px rgba(0,0,0,.15);
                    text-align:center;
                }

                .tasks-container button{
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    background:#0b7dda;
                    color:white;
                    cursor:pointer;
                    font-size:16px;
                }

                .tasks-container button:disabled{
                    background:gray;
                }
    </style>
</head>

<body>

    <div class="tasks-container">

            <h2>Today's Tasks</h2>

            {% for task in tasks %}

        <div class="task-card">

            <h3>{{ task.title }}</h3>

            <p>{{ task.description }}</p>

            <p>

            Reward

            <strong>

            KES {{ task.reward }}

            </strong>

            </p>

            {% if task.id in completed_ids %}

            <button disabled>

            ✅ Completed

            </button>

            {% else %}

            <a href="{{ task.url }}" target="_blank">

            <button>

            Start Task

            </button>

            </a>

            <form
            action="/claim-task/{{ task.id }}"
            method="POST">

            <button>

            Claim Reward

            </button>

            </form>

            {% endif %}

        </div>

            {% endfor %}

            <div class="task-progress">
                <h3>Today's Progress</h3>
                <p>{{ completed_today }} / {{ daily_limit }} Tasks Completed</p>
            </div>

    </div>


</body>
</html>
