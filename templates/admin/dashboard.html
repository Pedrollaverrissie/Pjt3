<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-container{

    width:90%;
    margin:auto;

}

.admin-container h1{

    text-align:center;
    margin:30px;
    color: white;

}

.admin-cards{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

}

.admin-card{

    background:white;

    border-radius:12px;

    padding:25px;

    text-align:center;

    box-shadow:0 0 10px rgba(0,0,0,.15);

}

.admin-card h2{

    color:#0d6efd;

    font-size:32px;

}

.admin-links{

    margin-top:40px;

    display:flex;

    gap:20px;

    justify-content:center;

    flex-wrap:wrap;

}

.admin-links a{

    text-decoration:none;

    background:#0d6efd;

    color:white;

    padding:12px 25px;

    border-radius:8px;
    font-size: 12px;

}
    </style>
</head>

<body>

<div class="admin-container">

    <h1>SUPER NOVA ADMIN PANEL</h1>

    <div class="admin-cards">

        <div class="admin-card">
            <h2>{{ total_users }}</h2>
            <p>Total Users</p>
        </div>

        <div class="admin-card">
            <h2>{{ pending_recharges }}</h2>
            <p>Pending Recharges</p>
        </div>

        <div class="admin-card">
            <h2>{{ pending_withdrawals }}</h2>
            <p>Pending Withdrawals</p>
        </div>

        <div class="admin-card">
            <h2>{{ vip_members }}</h2>
            <p>VIP Members</p>
        </div>

        <div class="admin-card">
            <h2>KES {{ total_deposits }}</h2>
            <p>Total Deposits</p>
        </div>

    </div>

    <hr>

    <div class="admin-links">

        <a href="/admin/users">Users</a>

        <a href="/admin/recharges">Recharges</a>

        <a href="/admin/withdrawals">
           
            Withdrawals
        </a>

        <a href="/admin/tasks">Tasks</a>

        <a href="/admin/vips">VIP Plans</a>

    </div>

</div>

</body>

</html>
