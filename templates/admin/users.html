<!DOCTYPE html>
<html>

<head>

    <title>Manage Users</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>
body{
            background-color: rgb(15, 1, 10);

        }
.admin-table{

      

width:100%;

border-collapse:collapse;

margin-top:20px;

}
h1{
    color: rgb(255, 111, 0);
    text-align: center;

}

.admin-table th{

background:#0d6efd;

color:white;

padding:12px;

}

.admin-table td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;
font-size: 14px;
color: white;

}
.admin-table tr td{
    font-size: 22px;
}
.admin-table tr:hover{

background:#000000;

}
    </style>

</head>

<body>

    <div class="admin-container">

            <h1>Manage Users</h1>

        <table class="admin-table">

            <tr>

                <th>ID</th>

                <th>Username</th>

                <th>Email</th>

                <th>VIP</th>

                <th>Main Wallet</th>

                <th>Task Wallet</th>

                <th>Team Wallet</th>

                <th>Actions</th>

            </tr>

            {% for user in users %}

            <tr>

                <td>{{ user.id }}</td>

                <td>{{ user.username }}</td>

                <td>{{ user.email }}</td>

                <td>{{ user.vip_level }}</td>

                <td>KES {{ user.main_wallet }}</td>

                <td>KES {{ user.task_wallet }}</td>

                <td>KES {{ user.team_wallet }}</td>

                <td>

                <a href="/admin/user/{{ user.id }}">
                View

                </a>

                </td>

             </tr>

            {% endfor %}

        </table>

            </div>

</body>

</html>
