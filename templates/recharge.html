<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

  background:#414141e8;

    padding:20px;

}

/* Container */

.container{

    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;

}

/* Card */

.card{

    width: 90%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
  
    justify-content: center;
    align-items: center;
    background:#0e1114;
    border-radius:25px;

    padding:15px;

   box-shadow: 0 -0 6px rgb(187, 189, 186);

}

/* Header */

.cover{

    text-align:center;
    margin-bottom:10px;

}

.icon{

    font-size:55px;
    margin-bottom:10px;

}

.cover h2{

    font-size:28px;
    color:white;
    margin-bottom:8px;

}

.cover p{

    color:#b8c5d6;
    font-size:15px;

}

/* Content */

.content{

    width:100%;

}

/* Inputs */

.content input{

    width:90%;

    padding:12px;

    margin-bottom:18px;

    border:none;

    border-radius:14px;

    background:rgba(255,255,255,.10);

    color:white;

    font-size:15px;

    outline:none;

    transition:.3s;
    margin-bottom: 30px;

}

.content input::placeholder{

    color:#d1d5db;

}

.content input:focus{

    border:1px solid #38bdf8;

    box-shadow:
    0 0 12px rgba(56,189,248,.4);

}

/* Button */

button{
     box-shadow: 0 -0 3px rgb(247, 248, 246);
                   

    width:70%;

    padding:12px;

    border:none;

    border-radius:14px 9px;

    background:rgba(75, 78, 80, 0);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;
    margin-top: 10px;

}

button:hover{
    
    transform:translateY(-2px);
    
    background:rgba(54, 54, 54, 0);




}

/* Mobile */

@media(max-width:480px){

.card{

    padding:25px;

}

.cover h2{

    font-size:23px;

}

.icon{

    font-size:45px;

}

button{

    padding:11px;

}

}
form{
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
    width: 100%;
}
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="cover">

            <div class="icon">💳</div>

            <h2>Recharge Wallet</h2>

        </div>

        <div class="content">

            <form method="POST">

                <input
                    type="number"
                    name="amount"
                    placeholder="Enter Amount"
                        min=""
                        step=""
                        value="200"
                    required
                >

                <input
                    type="text"
                    name="phone"
                    value="{{ current_user.phone }}"
                    placeholder="Phone Number"
                    required
                >

                <button type="submit">
                    Recharge Now
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
