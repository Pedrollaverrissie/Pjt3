<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
        padding:20px;
    }

    .container{
        width:100%;
        max-width:420px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(15px);
        border:1px solid rgba(255,255,255,0.15);
        border-radius:20px;
        padding:40px 30px;
        text-align:center;
        box-shadow:0 15px 35px rgba(0,0,0,0.3);
        animation:fadeIn .5s ease;
    }

    .icon{
        width:90px;
        height:90px;
        margin:0 auto 20px;
        border-radius:50%;
        background:#ef4444;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        font-size:40px;
        font-weight:bold;
    }

    h1{
        color:white;
        margin-bottom:12px;
        font-size:28px;
    }

    p{
        color:#cbd5e1;
        line-height:1.6;
        margin-bottom:30px;
    }

    .btn{
        display:inline-block;
        width:100%;
        padding:14px;
        border-radius:10px;
        background:#2563eb;
        color:white;
        text-decoration:none;
        font-weight:600;
        transition:.3s;
    }

    .btn:hover{
        background:#1d4ed8;
        transform:translateY(-2px);
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .footer{
        margin-top:20px;
        color:#94a3b8;
        font-size:13px;
    }
</style>
