<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Failed</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:rgb(0, 0, 2);
        padding:20px;
    }

    .container{
        width:100%;
        max-width:420px;
        background:rgba(255,255,255,0.08);
        border:1px solid rgba(255,255,255,0.15);
        border-radius:20px;
        padding:40px 30px;
        text-align:center;
        box-shadow:0 -0 5px rgb(98, 252, 2);
       
    }

    .icon{
        width:50px;
        height:50px;
        margin:0 auto 20px;
        border-radius:50%;
        background:#ef4444;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        font-size:20px;
        font-weight:bold;
    }

    h1{
        color:rgb(243, 198, 1);
        margin-bottom:12px;
        font-size:28px;
    }

    p{
        color:#f9f9f9;
        line-height:1.6;
        margin-bottom:30px;
    }

    .btn{
        display:inline-block;
        width:50%;
        padding:14px;
        border-radius:10px;
        background:#020607;
        color:rgb(253, 216, 5);
        text-decoration:none;
        font-weight:600;
        transition:.3s;
        box-shadow: 0 -0 3px rgb(102, 255, 0);
    }

    .btn:hover{
        background:#0e0d06;
        transform:translateY(-2px);
        box-shadow: 0 -0 5px rgb(255, 0, 179);
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    .footer{
        margin-top:20px;
        color:#94a3b8;
        font-size:13px;
    }
</style>


</head>
<body>

<div class="container">

    <div class="icon">
        ✕
    </div>

    <h1>Login Failed</h1>

    <p>
        The username, email, or password you entered is incorrect.
        Please verify your credentials and try again.
    </p>

    <a href="{{ url_for('login') }}" class="btn">
        Back to Login
    </a>

    <div class="footer">
        Secure Account Authentication
    </div>

</div>


</body>
</html>
