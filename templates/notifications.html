<!DOCTYPE html>

<html>

<head>

<title>Notifications</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="profile-body">

<div class="notification-page">

<h2>Notifications</h2>

{% for note in notes %}

<div class="notification-card">

<h3>{{ note.title }}</h3>

<p>{{ note.message }}</p>

<small>{{ note.created_at }}</small>

</div>

{% else %}

<p>No notifications yet.</p>

{% endfor %}

</div>

</body>

</html>
