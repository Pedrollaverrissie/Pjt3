<!DOCTYPE html>
<html>

<head>

<title>Complete Task</title>

<style>

body{
    background:#0b1020;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container{

    width:90%;
    max-width:650px;
    margin:40px auto;

}

#player{

    width:100%;
    height:360px;
    border-radius:15px;

}

button{

    margin-top:20px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    background:#16b364;
    color:white;
    font-size:18px;
    cursor:pointer;

}

button:disabled{

    background:gray;
    cursor:not-allowed;

}

.status{

    font-size:22px;
    color:#ff9900;
    margin:20px;

}

</style>

</head>

<body>

<div class="container">

<h2>{{ task.title }}</h2>

<p>{{ task.description }}</p>

<div id="player"></div>

<div class="status" id="status">

▶ Watch the video until it finishes to unlock your reward.

</div>

<form
action="/claim-task/{{ task.id }}"
method="POST">

<button
id="claimBtn"
disabled>

Claim Reward

</button>

</form>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

const btn=document.getElementById("claimBtn");
const status=document.getElementById("status");

const videoId="{{ task.url.split('/')[-1] }}";

function onYouTubeIframeAPIReady(){

    player=new YT.Player("player",{

        width:"100%",
        height:"360",

        videoId:videoId,

        playerVars:{

            autoplay:1,
            rel:0,
            modestbranding:1

        },

        events:{

            onStateChange:onPlayerStateChange

        }

    });

}

function onPlayerStateChange(event){

    if(event.data==YT.PlayerState.PLAYING){

        status.innerHTML="Watching video...";

    }

    if(event.data==YT.PlayerState.ENDED){

        status.innerHTML="✅ Video completed. You can now claim your reward.";

        btn.disabled=false;

    }

}

</script>

</body>

</html>
