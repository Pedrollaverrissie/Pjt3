<!DOCTYPE html>
<html>

<head>

<title>Complete Task</title>

<style>

body{

    margin:0;
    padding:0;

    background:#0b1020;
    color:white;
    font-family:Arial;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

}
.container{

    width:98%;
    max-width:800px;

    background:#121a33;

    padding:10px;

    border-radius:15px;

    box-shadow:0 -0 10px rgba(254, 254, 254, 0.4);

}

#player{

    width:100%;
    height:390px;

    border-radius:15px;

    overflow:hidden;

    margin-top:10px;

}

button{

    margin-top:20px;
    padding:15px 40px;

    border:none;
    border-radius:10px;

    background:#16b364;

    color:white;
    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover:not(:disabled){

    background:#149c58;
    transform:translateY(-2px);

}

button:disabled{

    background:#666;
    cursor:not-allowed;

}

.status{

    font-size:22px;
    color:#ff9900;
    margin:20px;

}

</style>

</head>

<body>

<div class="container">

<h2>{{ task.title }}</h2>

<p>{{ task.description }}</p>

<div id="player"></div>

<div class="status" id="status">

▶ Press Play and watch the video to unlock your reward.

</div>

<form
action="/claim-task/{{ task.id }}"
method="POST"
id="claimForm">

<input
type="hidden"
id="watchedSeconds"
name="watched_seconds"
value="0">

<input
type="hidden"
id="sessionToken"
value="{{ session_token }}">

<input
type="hidden"
name="session_token"
value="{{ session_token }}">

<button
id="claimBtn"
disabled>

Claim Reward

</button>

</form>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

const btn = document.getElementById("claimBtn");
const status = document.getElementById("status");
const watchedInput = document.getElementById("watchedSeconds");

const REQUIRED_SECONDS = 25;
const videoId = "{{ video_id }}";

let watched = 0;
let interval = null;

function onYouTubeIframeAPIReady(){

    player = new YT.Player("player",{

        width:"100%",
        height:"360",

        videoId:videoId,

        playerVars:{

            rel:0,
            modestbranding:1,
            controls:1,
            disablekb:1,
            playsinline:1,
            fs:0

        },

        events:{

            onStateChange:onPlayerStateChange

        }

    });

}

function onPlayerStateChange(event){

    if(event.data === YT.PlayerState.PLAYING){

        clearInterval(interval);

        status.innerHTML =
        "🎥 Watching...";

        interval = setInterval(function(){

            watched++;

            if(watched > REQUIRED_SECONDS){

                watched = REQUIRED_SECONDS;

            }

            watchedInput.value = watched;

            status.innerHTML =
            "🎥 Watching... " + watched + " / " + REQUIRED_SECONDS + " seconds";

            // Send progress to Flask every 5 seconds
            if(watched < REQUIRED_SECONDS && watched % 5 === 0){

                fetch("/update-task-progress",{

                    method:"POST",

                    headers:{

                        "Content-Type":"application/json"

                    },

                    body:JSON.stringify({

                        task_id:{{ task.id }},
                        watched:watched,
                        token:document.getElementById("sessionToken").value

                    })

                });

            }

            if(watched >= REQUIRED_SECONDS){

                clearInterval(interval);

                btn.disabled = false;

                status.innerHTML =
                "✅ Minimum watch time reached. You can now claim your reward.";

            }

        },1000);

    }

    else if(event.data === YT.PlayerState.PAUSED){

        clearInterval(interval);

        status.innerHTML =
        "⏸ Video paused. Continue watching.";

    }

    else if(event.data === YT.PlayerState.ENDED){

        clearInterval(interval);

        watched = REQUIRED_SECONDS;

        watchedInput.value = watched;

        btn.disabled = false;

        status.innerHTML =
        "✅ Video completed. You can now claim your reward.";

    }

    else{

        clearInterval(interval);

    }

}

// Prevent double claim
document.getElementById("claimForm").addEventListener("submit",function(){

    btn.disabled = true;

    btn.innerHTML = "Claiming Reward...";

});

</script>

</body>

</html>
